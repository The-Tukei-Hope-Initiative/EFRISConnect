<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Document</title>
<style>
  :root{
    --accent:#1b4332; --accent-lt:#2e7d32; --stamp:#c9963a;
    --bg:#f5f5f5; --paper:#fff; --ink:#1f2937; --muted:#6b7280; --line:#e5e7eb; --hd:#f2f4f7;
  }
  *{box-sizing:border-box;}
  body{background:var(--bg);margin:0;padding:0;font-family:'Segoe UI',Arial,sans-serif;color:var(--ink);font-size:13px;}
  main{background:var(--paper);max-width:820px;margin:16px auto;border:1px solid var(--line);border-radius:6px;box-shadow:0 4px 12px rgba(0,0,0,.06);overflow:hidden;}
  /* Header: white sheet anchored by a thin accent rule - no filled band (print-friendly) */
  .hd{background:var(--paper);color:var(--ink);padding:18px 22px;display:flex;gap:16px;align-items:flex-start;border-bottom:2px solid var(--accent);}
  .hd .logo{width:60px;height:60px;border-radius:6px;background:rgba(0,0,0,.05);object-fit:contain;flex:0 0 auto;}
  .hd .biz{flex:1;min-width:0;}
  .hd .biz .nm{font-size:18px;font-weight:700;line-height:1.2;color:var(--ink);}
  .hd .biz .addr{font-size:11px;color:var(--muted);margin-top:4px;white-space:pre-line;}
  .hd .biz .bf{font-size:11px;color:var(--muted);margin-top:2px;}
  .hd .doc{text-align:right;flex:0 0 auto;}
  /* Document title: accent text with a stamp-colour underline */
  .doctype{display:inline-block;border-bottom:2px solid var(--stamp);color:var(--accent);font-weight:700;padding:0 2px 3px;font-size:16px;letter-spacing:.5px;}
  .doc .meta{margin-top:8px;font-size:11px;line-height:1.7;color:var(--muted);}
  .doc .meta b{font-size:12px;color:var(--ink);}
  .body{padding:18px 22px;}
  .parties{display:flex;gap:24px;border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:12px;flex-wrap:wrap;}
  .lbl{font-size:10px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:3px;}
  .party{flex:1;min-width:180px;}
  .party .v{font-size:13px;}
  .status{display:inline-block;border-radius:5px;padding:3px 10px;font-size:11px;font-weight:700;margin-bottom:10px;}
  .status.positive{background:#e8f5e9;color:#1b5e20;border:1px solid #a5d6a7;}
  .status.negative{background:#ffebee;color:#b71c1c;border:1px solid #ef9a9a;}
  .status.neutral{background:#eceff1;color:#37474f;border:1px solid #cfd8dc;}
  .flds{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:6px 18px;margin-bottom:12px;}
  .fld .k{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
  .fld .vv{font-size:12px;}
  table.items{width:100%;border-collapse:collapse;margin:6px 0 12px;}
  table.items thead th{background:var(--hd);color:var(--accent);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.4px;padding:7px 8px;text-align:left;border-bottom:1px solid var(--line);}
  table.items td{padding:7px 8px;border-bottom:1px solid var(--line);font-size:12px;vertical-align:top;}
  table.items tr.total td{font-weight:700;background:#f8faf8;}
  table.items tr.group td{font-weight:700;background:#f0f4f0;}
  .ar{text-align:right;} .ac{text-align:center;}
  .totals{margin-left:auto;width:300px;max-width:100%;}
  .totals .row{display:flex;justify-content:space-between;padding:4px 0;font-size:12px;border-bottom:1px solid var(--line);}
  .totals .row.grand{font-weight:700;font-size:15px;border-bottom:none;border-top:2px solid var(--accent);margin-top:2px;color:var(--accent);background:var(--hd);padding:9px 10px;}
  .totals .row.grand span:first-child{text-transform:uppercase;letter-spacing:1.2px;font-size:11px;}
  .efris{margin-top:16px;border:1px solid var(--line);border-radius:6px;padding:12px 14px;display:flex;gap:16px;align-items:flex-start;}
  .efris .ef{flex:1;}
  .efris .ef .ttl{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--accent);margin-bottom:6px;}
  .efris .ef .er{display:flex;gap:8px;font-size:11px;margin-bottom:3px;}
  .efris .ef .er .ek{color:var(--muted);min-width:120px;}
  .efris .ef .er .ev{font-family:monospace;}
  .efris .qr{flex:0 0 auto;text-align:center;}
  .efris .qr img{width:128px;height:128px;}
  .efris .qr .cap{font-size:9px;color:var(--muted);margin-top:3px;max-width:128px;}
  .footers{margin-top:14px;font-size:11px;color:var(--muted);border-top:1px solid var(--line);padding-top:10px;}
  a{color:var(--accent-lt);}
  @page{margin:10mm;size:A5;}
  #themeControls{max-width:760px;margin:10px auto 0;display:flex;flex-wrap:wrap;gap:10px;align-items:center;font-size:12px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:8px 12px;}
  #themeControls select{font-size:12px;padding:3px 6px;border:1px solid var(--line);border-radius:4px;background:#fff;}
  #themeControls button{font-size:12px;padding:5px 12px;border:1px solid var(--accent);background:var(--accent);color:#fff;border-radius:5px;cursor:pointer;}
  @media print{
    body{background:#fff;}
    main{box-shadow:none;border:none;margin:0;max-width:100%;border-radius:0;}
    #themeControls{display:none !important;}
  }
</style>
</head>
<body>
<div id="themeControls">
  <label>Page size:&nbsp;<select id="themePage" onchange="themeSetPage(this.value)">
    <option value="A5" selected>A5 (half page)</option>
    <option value="A4">A4</option>
    <option value="Letter">Letter</option>
    <option value="80mm">80mm thermal receipt</option>
  </select></label>
  <button onclick="window.print()">&#128438; Print / Save PDF</button>
  <span style="font-size:10.5px;color:var(--muted);">This bar is hidden on the printout.</span>
</div>
<main></main>
<script>
/*@QRLIB@*/ /* offline QR encoder injected here (inside this script) when served via /branded-theme */
// Adjustable page size (mirrors the extension's print feature). Injects a dynamic
// @page + sheet width; 80mm targets thermal receipt printers.
function themeSetPage(v){
  var sizes={A4:['210mm 297mm','794px'],A5:['148mm 210mm','559px'],Letter:['216mm 279mm','816px'],'80mm':['80mm auto','302px']};
  var cfg=sizes[v]||sizes.A5;
  var st=document.getElementById('themePageStyle')||document.createElement('style');
  st.id='themePageStyle';
  var css='@media print{@page{size:'+cfg[0]+';margin:'+(v==='80mm'?'0':'8mm')+';}} main{max-width:'+cfg[1]+';}';
  if(v==='80mm'){
    // Thermal roll: centre the whole header with the logo on top, then stack the
    // parties/totals into one narrow column so nothing runs off the strip.
    css+='.hd{flex-direction:column;align-items:center;text-align:center;gap:6px;padding:12px 8px;}'
       +'.hd .logo{width:46px;height:46px;}'
       +'.hd .biz{text-align:center;}.hd .doc{text-align:center;}'
       +'.doc .meta{text-align:center;}'
       +'.parties{flex-direction:column;gap:10px;}';
  }
  st.textContent=css;
  document.head.appendChild(st);
}
try{ themeSetPage('A5'); }catch(e){}
// Brand theme for Manager documents (receipt / invoice / credit note / etc.).
// Fetches the document and renders it in the EFRISConnect branded style, with a
// scannable QR built from the EFRIS "QR Code" validation URL custom field.
fetch('/api4/view-v1' + window.location.search, { headers:{Accept:'application/json'}, credentials:'same-origin' })
  .then(r => r.json())
  .then(renderDocument)
  .catch(function(e){ document.querySelector('main').textContent = ''; });

function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function isUrl(s){ return /^https?:\/\//i.test(String(s||'')); }

// Find a document field (or business field) by matching label keywords.
function findField(fields, kw){
  if(!Array.isArray(fields)) return null;
  for(const f of fields){
    const lab=(f.label||'').toLowerCase(), key=(f.key||'').toLowerCase();
    if(kw.some(k=>lab.includes(k)||key.includes(k))) return f;
  }
  return null;
}

function renderDocument(d){
  if(!d || typeof d!=='object'){ return; }
  const biz = d.business || {};
  const bizName = biz.name || d.businessName || '';
  const rec = d.recipient || {};
  const allFields = Array.isArray(d.fields)? d.fields : [];

  // Split EFRIS fiscal fields out of the general field list.
  const fdnF   = findField(allFields,['fdn','fiscal document']);
  const verF   = findField(allFields,['verification']);
  const qrF    = findField(allFields,['qr code','qr']);
  const devF   = findField(allFields,['device']);
  const invIdF = findField(allFields,['invoice id','ugx inv']);
  const subF   = findField(allFields,['submission date']);
  const isEfris = !!(fdnF && (fdnF.text||'').trim());
  const efrisKeys = new Set([fdnF,verF,qrF,devF,invIdF,subF].filter(Boolean));
  const topFields  = allFields.filter(f=>!efrisKeys.has(f) && f.displayAtTheTop);
  const bodyFields = allFields.filter(f=>!efrisKeys.has(f) && !f.displayAtTheTop);

  document.title = (d.title||'Document') + (d.reference? ' '+d.reference : '') + (bizName? ' - '+bizName : '');

  let h='';
  // ── Header ──
  h+='<div class="hd">';
  if(biz.logo) h+='<img class="logo" src="'+esc(biz.logo)+'" alt=""/>';
  h+='<div class="biz"><div class="nm">'+esc(bizName)+'</div>';
  if(biz.address) h+='<div class="addr">'+esc(biz.address)+'</div>';
  (biz.fields||[]).forEach(function(f){ if(f.text) h+='<div class="bf">'+esc(f.label)+': '+esc(f.text)+'</div>'; });
  h+='</div>';
  h+='<div class="doc"><span class="doctype">'+esc(d.title||'Document')+'</span><div class="meta">';
  if(d.reference) h+='<div>No. <b>'+esc(d.reference)+'</b></div>';
  topFields.forEach(function(f){ if(f.text) h+='<div>'+esc(f.label)+' <b>'+esc(f.text)+'</b></div>'; });
  (d.subtitles||[]).forEach(function(s){ h+='<div>'+esc(s)+'</div>'; });
  h+='</div></div></div>';

  // ── Body ──
  h+='<div class="body">';
  if(d.status && d.status.text){ h+='<span class="status '+esc(d.status.tone||'neutral')+'">'+esc(d.status.text)+'</span>'; }

  // Parties
  if(rec && (rec.name||rec.address||rec.email)){
    h+='<div class="parties"><div class="party"><div class="lbl">Issued to</div>';
    if(rec.name)    h+='<div class="v"><strong>'+esc(rec.name)+'</strong></div>';
    if(rec.address) h+='<div class="v" style="white-space:pre-line;color:var(--muted);">'+esc(rec.address)+'</div>';
    if(rec.email)   h+='<div class="v" style="color:var(--muted);">'+esc(rec.email)+'</div>';
    h+='</div></div>';
  }

  // General fields
  if(bodyFields.length){
    h+='<div class="flds">';
    bodyFields.forEach(function(f){ if(f.text||f.label) h+='<div class="fld"><div class="k">'+esc(f.label)+'</div><div class="vv">'+(f.link&&isUrl(f.link.url)?'<a target="_top" href="'+esc(f.link.url)+'">'+esc(f.text||f.link.url)+'</a>':esc(f.text||''))+'</div></div>'; });
    h+='</div>';
  }

  // Body table
  const t=d.table;
  if(t && Array.isArray(t.columns) && t.columns.length){
    if(t.description) h+='<div style="font-size:12px;margin:4px 0;">'+esc(t.description)+'</div>';
    const cols=t.columns;
    // Fold Commodity Code / Category Path columns under the item name so the
    // table stays tidy (matches the extension's receipt style).
    const foldIdx=cols.map(function(c,i){ return /commodit|categor/i.test((c.label||'')+' '+(c.key||''))?i:-1; }).filter(function(i){return i>=0;});
    const mainIdx=cols.map(function(c,i){return i;}).filter(function(i){return foldIdx.indexOf(i)<0;});
    h+='<table class="items"><thead><tr>';
    mainIdx.forEach(function(i){ const c=cols[i]; h+='<th class="'+(c.align==='right'||c.align==='end'?'ar':(c.align==='center'?'ac':''))+'">'+esc(c.label)+'</th>'; });
    h+='</tr></thead><tbody>';
    h+=renderRows(t.rows||[], cols, mainIdx, foldIdx);
    h+='</tbody></table>';
  }

  // Totals
  if(Array.isArray(d.totals) && d.totals.length){
    h+='<div class="totals">';
    d.totals.forEach(function(tt){ h+='<div class="row'+(tt.emphasis?' grand':'')+'"><span>'+esc(tt.label)+'</span><span>'+esc(tt.text)+'</span></div>'; });
    h+='</div>';
  }

  // EFRIS fiscal block + QR
  if(isEfris){
    h+='<div class="efris"><div class="ef"><div class="ttl">URA EFRIS - Fiscal Document</div>';
    if(fdnF)   h+='<div class="er"><span class="ek">FDN</span><span class="ev">'+esc(fdnF.text)+'</span></div>';
    if(verF)   h+='<div class="er"><span class="ek">Verification Code</span><span class="ev">'+esc(verF.text)+'</span></div>';
    if(invIdF) h+='<div class="er"><span class="ek">UGX Invoice ID</span><span class="ev">'+esc(invIdF.text)+'</span></div>';
    if(devF)   h+='<div class="er"><span class="ek">Device No.</span><span class="ev">'+esc(devF.text)+'</span></div>';
    if(subF)   h+='<div class="er"><span class="ek">Submission Date</span><span class="ev">'+esc(subF.text)+'</span></div>';
    h+='</div>';
    const qrData = qrF && (qrF.text||'') ? qrF.text : '';
    if(qrData){
      let qrImg='';
      // Offline QR only, via the inlined encoder - no external service (keeps the
      // fiscal data self-contained and offline-capable). If encoding fails, show
      // the verification link as text rather than calling out to a third party.
      try{
        if(typeof qrcode!=='undefined'){ const q=qrcode(0,'M'); q.addData(qrData); q.make(); qrImg='<img alt="EFRIS QR" style="width:132px;height:132px;image-rendering:pixelated;" src="'+q.createDataURL(4,8)+'"/>'; }
      }catch(e){}
      if(!qrImg) qrImg='<div style="font-size:9px;word-break:break-all;max-width:132px;">'+esc(qrData)+'</div>';
      h+='<div class="qr">'+qrImg+'<div class="cap">Scan to verify on URA EFRIS</div></div>';
    }
    h+='</div>';
  }

  // Footers (pre-rendered HTML)
  if(Array.isArray(d.footers) && d.footers.length){
    h+='<div class="footers">'+d.footers.join('')+'</div>';
  }
  h+='</div>';

  document.querySelector('main').innerHTML=h;
}

function renderRows(rows, cols, mainIdx, foldIdx){
  mainIdx = mainIdx || cols.map(function(c,i){return i;});
  foldIdx = foldIdx || [];
  let h='';
  (rows||[]).forEach(function(r){
    if(Array.isArray(r.rows) && r.rows.length){
      // group container row
      const head=(r.cells&&r.cells[0])?r.cells[0].text:'';
      h+='<tr class="group"><td colspan="'+mainIdx.length+'">'+esc(head)+'</td></tr>';
      h+=renderRows(r.rows, cols, mainIdx, foldIdx);
    } else {
      const cells=r.cells||[];
      // Fold Commodity Code / Category Path values into small sub-text under the item.
      let foldHtml='';
      if(!r.isTotalRow){
        foldIdx.forEach(function(fi){ const fc=cells[fi]; const txt=fc&&fc.text; if(txt) foldHtml+='<div style="font-size:10px;color:var(--muted);line-height:1.3;">'+esc((cols[fi].label||'')+': ')+esc(txt)+'</div>'; });
      }
      h+='<tr'+(r.isTotalRow?' class="total"':'')+'>';
      mainIdx.forEach(function(i,pos){
        const c=cells[i]||{}; const col=cols[i]||{};
        const cls=(col.align==='right'||col.align==='end')?'ar':(col.align==='center'?'ac':'');
        let inner;
        if(c.image && c.image.url) inner='<img src="'+esc(c.image.url)+'" alt="'+esc(c.text||'')+'" style="max-height:36px;"/>';
        else inner=esc(c.text||'');
        if(c.link && isUrl(c.link.url)) inner='<a target="_top" href="'+esc(c.link.url)+'">'+inner+'</a>';
        if(pos===0 && foldHtml) inner+=foldHtml; // attach commodity/category under the item
        h+='<td class="'+cls+'">'+inner+'</td>';
      });
      h+='</tr>';
    }
  });
  return h;
}
</script>
</body>
</html>
